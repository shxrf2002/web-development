<!DOCTYPE html>
<html>
<body>
    <p id="result"></p>
<script>
 function display(some){
    document.getElementById("result").innerhtml=some;
}
function add(a,b){
    var add= a+b;
    display(add);
    
}
let myPromise = new Promise(function(myResolve, myReject) {
    let x = 0;

    if (x == 0) {
        myResolve("OK");   
    } else {
        myReject("Error"); 
    }
});
myPromise.then(
    function(value){add(5,5); },
    function(error){add(error); },
);


</script>
</body>
</html>
